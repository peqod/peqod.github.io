title: madethis.blog
description: Notes on making, design, systems, and the odd detour by Wiktor Kaczmarek.
url: https://madethis.blog
baseurl: ""
author:
  name: Wiktor Kaczmarek
  email: allthingsdesignconsidered@gmail.com

markdown: kramdown
kramdown:
  input: GFM
  smart_quotes: ["apos", "apos", "quot", "quot"]

permalink: /posts/:slug.html

collections:
  log:
    output: true
    permalink: /posts/:slug.html
  projects:
    output: true
    permalink: /posts/:slug.html
  about:
    output: true
    permalink: /posts/:slug.html
  work:
    output: true
    permalink: /work/:slug.html

defaults:
  - scope:
      path: ""
      type: log
    values:
      layout: post
      category: log
  - scope:
      path: ""
      type: projects
    values:
      layout: post
      category: projects
  - scope:
      path: ""
      type: about
    values:
      layout: post
      category: about
  - scope:
      path: ""
      type: work
    values:
      layout: work
      category: work
      main_class: wide

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
  - .obsidian/
  - .trash/
  - journal/
  - reference/
  - threads/
  - _templates/
  - projects/
  - Clippings/
  - Books To Read/
  - writing/
  - vault/
  - site/
  - docs/
  - README.md
  - image1.md
  - assets/cv_kaczmarek.pdf

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
